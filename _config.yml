### Do not change the following unless you know what you are doing ###

baseurl: "/preview-1-red"
url: ""

markdown: kramdown
permalink: blog/:year/:month/:title
excerpt_separator: "<!--more-->"

include: ['_images', '_css']
exclude:
  - develop
  - hertie-config.yml
  - vendor
  - Gemfile
  - Gemfile.lock
  - node_modules
  - .bundle

dateformat: "%m/%d/%Y"
future: true

collections:
    events:
        output: true
    lectures:
        output: true
    assignments:
        output: true
    announcements:
        output: false

defaults:
  - scope:
      path: ""
      type: "assignments"
    values:
      layout: "assignment"
